name: Build Juken 5+ APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:   # bisa trigger manual dari GitHub UI

jobs:
  build-apk:
    name: Build Android APK
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout kode
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2. Setup Node.js
      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      # 3. Setup Java 17
      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      # 4. Setup Android SDK
      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      # 5. Install npm dependencies
      - name: Install dependencies
        run: npm ci

      # 6. Tambah platform Android via Capacitor
      - name: Add Android platform
        run: npx cap add android

      # 7. Sync web assets ke Android
      - name: Sync Capacitor
        run: npx cap sync android

      # 8. Patch AndroidManifest.xml — tambah Bluetooth permissions
      - name: Patch AndroidManifest — Bluetooth Permissions
        run: |
          MANIFEST="android/app/src/main/AndroidManifest.xml"
          # Inject permissions sebelum tag <application>
          sed -i 's|<application|<!-- Bluetooth Permissions -->\n    <uses-permission android:name="android.permission.BLUETOOTH" android:maxSdkVersion="30" />\n    <uses-permission android:name="android.permission.BLUETOOTH_ADMIN" android:maxSdkVersion="30" />\n    <uses-permission android:name="android.permission.BLUETOOTH_SCAN" android:usesPermissionFlags="neverForLocation" />\n    <uses-permission android:name="android.permission.BLUETOOTH_CONNECT" />\n    <uses-permission android:name="android.permission.BLUETOOTH_ADVERTISE" />\n    <uses-permission android:name="android.permission.INTERNET" />\n    <uses-feature android:name="android.hardware.bluetooth_le" android:required="true" />\n    <application|' "$MANIFEST"
          echo "✅ AndroidManifest patched"
          grep -c "BLUETOOTH" "$MANIFEST" && echo "Bluetooth permissions: OK"

      # 9. Patch build.gradle — set minSdk=26 (Android 8+)
      - name: Patch build.gradle — minSdkVersion 26
        run: |
          GRADLE="android/app/build.gradle"
          sed -i 's/minSdkVersion [0-9]*/minSdkVersion 26/' "$GRADLE"
          sed -i 's/targetSdkVersion [0-9]*/targetSdkVersion 34/' "$GRADLE"
          sed -i 's/compileSdkVersion [0-9]*/compileSdkVersion 34/' "$GRADLE"
          echo "✅ build.gradle patched"
          grep -E "minSdk|targetSdk|compileSdk" "$GRADLE"

      # 10. Patch MainActivity.java — register BluetoothLe plugin
      - name: Register BluetoothLe plugin in MainActivity
        run: |
          MAIN=$(find android/app/src/main/java -name "MainActivity.java" | head -1)
          echo "Found: $MAIN"
          cat > "$MAIN" << 'EOF'
          package com.juken5plus.variomapper;

          import android.os.Bundle;
          import com.getcapacitor.BridgeActivity;
          import com.capacitorjs.community.bluetoothle.BluetoothLe;

          public class MainActivity extends BridgeActivity {
              @Override
              public void onCreate(Bundle savedInstanceState) {
                  registerPlugin(BluetoothLe.class);
                  super.onCreate(savedInstanceState);
              }
          }
          EOF
          echo "✅ MainActivity.java updated"

      # 11. Set Gradle permissions
      - name: Set Gradle executable
        run: chmod +x android/gradlew

      # 12. Build DEBUG APK
      - name: Build Debug APK
        working-directory: android
        run: ./gradlew assembleDebug --no-daemon --stacktrace

      # 13. Rename APK
      - name: Rename APK
        run: |
          mkdir -p output
          cp android/app/build/outputs/apk/debug/app-debug.apk \
             output/juken5plus-vario-mapper-v1.0.apk
          echo "✅ APK ready!"
          ls -lh output/

      # 14. Upload APK sebagai artifact (bisa didownload dari GitHub)
      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Juken5Plus-APK
          path: output/juken5plus-vario-mapper-v1.0.apk
          retention-days: 30

      # 15. Buat GitHub Release otomatis jika push ke main
      - name: Create GitHub Release
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v1.0.${{ github.run_number }}
          name: "Juken 5+ Mapper v1.0.${{ github.run_number }}"
          body: |
            ## 🏍️ Juken 5+ Vario ECU Mapper APK

            ### Fitur:
            - ✅ Auto Mapping 84 cell (12 RPM × 7 TPS)
            - ✅ Bluetooth Live Data (HC-05 / HM-10)
            - ✅ Fuel Map, Ignition Timing, IAT Correction, Target AFR
            - ✅ Flash ECU via Bluetooth
            - ✅ Target Android 8.0+ (API 26+)

            ### Install:
            1. Download APK di bawah
            2. Aktifkan "Install dari sumber tidak dikenal"
            3. Install & buka app
            4. Tap CONNECT BT → pilih modul BT ECU
          files: output/juken5plus-vario-mapper-v1.0.apk
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
